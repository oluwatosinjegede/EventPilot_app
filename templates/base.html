<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EventPilot</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-slate-50 text-slate-900"><nav class="bg-white border-b"><div class="max-w-7xl mx-auto px-4 py-3 flex justify-between"><a class="font-bold text-indigo-700 text-xl" href="/">EventPilot</a><div class="space-x-4 text-sm">{% if user.is_authenticated %}<a href="{% url 'dashboard' %}">Dashboard</a><a href="{% url 'event_list' %}">Events</a><a href="{% url 'organizations' %}">Organizations</a><a href="{% url 'profile' %}">Profile</a><form class="inline" method="post" action="{% url 'logout' %}">{% csrf_token %}<button>Logout</button></form>{% else %}<a href="{% url 'login' %}">Login</a><a class="bg-indigo-600 text-white rounded px-3 py-2" href="{% url 'register' %}">Register</a>{% endif %}</div></div></nav><main class="max-w-7xl mx-auto px-4 py-8">{% for message in messages %}<div class="mb-4 rounded bg-indigo-50 border border-indigo-200 p-3">{{ message }}</div>{% endfor %}{% block content %}{% endblock %}</main></body></html>
