{% extends 'base.html' %}{% block content %}<div class="flex justify-between"><h1 class="text-3xl font-bold">Dashboard</h1><a class="rounded bg-indigo-600 px-4 py-2 text-white" href="{% url 'event_create' %}">New event</a></div><div class="grid md:grid-cols-3 gap-4 mt-6">{% for event in events %}<a class="bg-white rounded shadow p-5" href="{% url 'event_detail' event.pk %}"><h2 class="font-semibold text-lg">{{ event.title }}</h2><p>{{ event.start_at }}</p><p class="text-sm text-slate-500">{{ event.guests.count }} guests · {{ event.get_status_display }}</p></a>{% empty %}<p>Create an event to see readiness metrics.</p>{% endfor %}</div>{% endblock %}
