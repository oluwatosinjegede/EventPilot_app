{% extends 'base.html' %}{% block content %}<div class="flex justify-between"><h1 class="text-3xl font-bold">Events</h1><a class="rounded bg-indigo-600 px-4 py-2 text-white" href="{% url 'event_create' %}">Create event</a></div><div class="bg-white rounded shadow mt-6 divide-y">{% for event in events %}<div class="p-4 flex justify-between"><a class="font-semibold" href="{% url 'event_detail' event.pk %}">{{ event.title }}</a><span>{{ event.start_at }}</span></div>{% empty %}<p class="p-4">No events yet.</p>{% endfor %}</div>{% endblock %}
