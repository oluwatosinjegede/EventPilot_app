{% with s=status|default:''|lower %}<span class="badge {% if s == 'attending' or s == 'confirmed' or s == 'complete' or s == 'completed' %}bg-green-100 text-green-800{% elif s == 'pending' or s == 'maybe' or s == 'already_checked_in' %}bg-yellow-100 text-yellow-800{% elif s == 'declining' or s == 'declined' or s == 'blocked' or s == 'invalid_code' or s == 'wrong_event' or s == 'access_revoked' %}bg-red-100 text-red-800{% elif s == 'sent' or s == 'opened' %}bg-blue-100 text-blue-800{% elif s == 'checked_in' or s == 'valid' %}bg-emerald-100 text-emerald-800{% else %}bg-slate-100 text-slate-700{% endif %}">{{ label|default:status }}</span>{% endwith %}
