<div class="space-y-2">
  <label for="{{ field.id_for_label }}" class="text-sm font-bold text-slate-700">{{ field.label }}{% if field.field.required %} <span class="text-red-600" aria-label="required">*</span>{% endif %}</label>
  {{ field }}
  {% if field.help_text %}<p class="text-xs text-slate-500">{{ field.help_text }}</p>{% endif %}
  {% for error in field.errors %}<p class="text-sm font-semibold text-red-700">{{ error }}</p>{% endfor %}
</div>
