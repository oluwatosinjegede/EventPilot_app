<header class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur">
  <div class="flex h-16 items-center justify-between gap-4 px-4 sm:px-6 lg:px-8">
    <div class="flex items-center gap-3 lg:hidden">
      <a href="{% url 'home' %}" class="grid h-10 w-10 place-items-center rounded-2xl bg-indigo-600 font-black text-white">EP</a>
      <span class="font-black text-slate-950">EventPilot</span>
    </div>
    <div class="hidden lg:block">
      <p class="text-sm font-semibold text-slate-500">Workspace</p>
      <p class="text-base font-bold text-slate-900">Plan · Invite · Access · Check-In</p>
    </div>
    <nav class="flex items-center gap-2 text-sm font-semibold">
      {% if user.is_authenticated %}
        <a class="hidden rounded-xl px-3 py-2 text-slate-600 hover:bg-slate-100 sm:inline-flex" href="{% url 'event_list' %}">Events</a>
        <a class="hidden rounded-xl px-3 py-2 text-slate-600 hover:bg-slate-100 sm:inline-flex" href="{% url 'organizations' %}">Organizations</a>
        <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="btn btn-secondary">Logout</button></form>
      {% else %}
        <a class="btn btn-secondary" href="{% url 'login' %}">Login</a>
        <a class="btn btn-primary" href="{% url 'register' %}">Register</a>
      {% endif %}
    </nav>
  </div>
</header>
