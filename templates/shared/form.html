{% csrf_token %}
<div class="form space-y-4">
  {% if form.non_field_errors %}<div class="rounded-xl border border-red-200 bg-red-50 p-3 text-sm font-semibold text-red-800">{{ form.non_field_errors }}</div>{% endif %}
  {% for field in form %}{% include 'partials/_form_field.html' with field=field %}{% endfor %}
</div>
<div class="mt-6 flex flex-wrap gap-3">
  <button class="btn btn-primary">Save</button>
  <a class="btn btn-secondary" href="javascript:history.back()">Cancel</a>
</div>
